apiVersion: v1
kind: Secret
metadata:
  name: acdp-artifact-store
  namespace: acdp
type: Opaque
stringData:
  # 对象存储内部访问地址，admin/runtime 均通过它进行控制面读写。
  endpoint: "http://minio.example.internal:9000"
  # 控制面生成下载链接时对外返回的基地址。
  public-base-url: "http://minio.example.internal:9000"
  # 发布产物桶名。
  bucket: "acdp-artifacts"
  # 对象存储区域；MinIO 本地场景可留空。
  region: ""
  # 可选 root 账号，用于初始化或确保桶存在。
  root-user: ""
  # root 账号密码。
  root-password: ""
  # 实际访问对象存储的 access key。
  access-key: ""
  # 实际访问对象存储的 secret key。
  secret-key: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: acdp-runtime-auth
  namespace: acdp
type: Opaque
stringData:
  # runtime 与 admin 控制面之间共享的 Bearer Token。
  runtime-token: "replace-with-runtime-token"
